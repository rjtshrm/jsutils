<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Tools</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.7.107/pdf.min.js"></script>
</head>
<body>
  <h1>Client-side PDF Tools</h1>
  <section id="imgToPdf">
    <h2>Images to PDF</h2>
    <input type="file" id="imgFiles" multiple accept="image/*" />
    <button id="imgToPdfBtn">Convert</button>
  </section>

  <section id="pdfToImg">
    <h2>PDF to Images</h2>
    <input type="file" id="pdfToImgFile" accept="application/pdf" />
    <button id="pdfToImgBtn">Convert</button>
    <div id="imgPreview"></div>
  </section>

  <section id="mergePdf">
    <h2>Merge PDFs</h2>
    <input type="file" id="mergeFiles" multiple accept="application/pdf" />
    <button id="mergeBtn">Merge</button>
  </section>

  <section id="splitPdf">
    <h2>Split PDF (page range)</h2>
    <input type="file" id="splitFile" accept="application/pdf" />
    <input type="text" id="splitRange" placeholder="e.g. 1-3,5" />
    <button id="splitBtn">Split</button>
  </section>

  <script src="app.js"></script>
</body>
</html>
